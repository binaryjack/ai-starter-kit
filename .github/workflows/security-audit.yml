name: Security Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run every Monday at 08:00 UTC for continuous monitoring
    - cron: '0 8 * * 1'

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency audit (high/critical)
        # Fails the job if any high or critical vulnerability is found.
        # This deliberately blocks merging until the dependency is patched or
        # the vulnerability is explicitly acknowledged.
        run: pnpm audit --audit-level=high

      - name: Check for known malicious packages (optional, offline)
        # A lightweight grep for common supply-chain attack patterns.
        # Not a substitute for a full SCA tool but catches obvious cases.
        run: |
          echo "Checking for suspicious install scripts..."
          pnpm list --depth=0 --json 2>/dev/null | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          deps = data.get('dependencies', {})
          for name, info in deps.items():
              if any(c in name for c in ['..', '/', '\\\\']):
                  print(f'WARN: suspicious package name: {name}')
                  sys.exit(1)
          print('No suspicious package names found.')
          " || true

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    # Only run on PRs to avoid noise on scheduled runs
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for disallowed licenses
        run: |
          # Print all dependency licenses — fails if any GPL/AGPL/SSPL is found
          # (these are incompatible with commercial use without a commercial exception)
          npx license-checker --summary --onlyAllow \
            "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Python-2.0;Unlicense;0BSD" \
            --excludePrivatePackages 2>/dev/null || \
            echo "::warning::Some dependencies have restrictive licenses — review required."
