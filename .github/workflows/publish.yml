name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — report what would be published without sending to npm'
        type: boolean
        default: true

jobs:
  publish:
    name: Build and publish packages
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # enables npm provenance attestation
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build in strict dependency order
      - name: Build packages
        run: |
          pnpm --filter @ai-agencee/core    run build
          pnpm --filter @ai-agencee/engine  run build
          pnpm --filter @ai-agencee/mcp     run build
          pnpm --filter @ai-agencee/cli     run build

      # Resolve --dry-run flag: set when manually dispatched with dry_run=true
      - name: Set publish flags
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "extra=--dry-run" >> $GITHUB_OUTPUT
            echo "::notice::Running in DRY-RUN mode — nothing will be published to npm."
          else
            echo "extra=" >> $GITHUB_OUTPUT
            echo "::notice::Running in PUBLISH mode."
          fi

      # Deprecate old MVP packages (ai-kit-* names) — runs only in non-dry-run mode
      - name: Deprecate old MVP packages on npm
        if: steps.flags.outputs.extra == ''
        run: |
          for pkg in \
            "@ai-agencee/ai-kit-core" \
            "@ai-agencee/ai-kit-agent-executor" \
            "@ai-agencee/ai-kit-mcp" \
            "@ai-agencee/ai-kit-cli"; do
            npm deprecate "$pkg" \
              "⚠️ This MVP package is no longer maintained. Use ${pkg/ai-kit-/} instead." \
              --registry https://registry.npmjs.org 2>/dev/null || true
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish in dependency order — workspace: refs are resolved to semver by pnpm publish
      - name: Publish @ai-agencee/core
        run: pnpm --filter @ai-agencee/core publish --no-git-checks ${{ steps.flags.outputs.extra }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ai-agencee/engine
        run: pnpm --filter @ai-agencee/engine publish --no-git-checks ${{ steps.flags.outputs.extra }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ai-agencee/mcp
        run: pnpm --filter @ai-agencee/mcp publish --no-git-checks ${{ steps.flags.outputs.extra }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ai-agencee/cli
        run: pnpm --filter @ai-agencee/cli publish --no-git-checks ${{ steps.flags.outputs.extra }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
